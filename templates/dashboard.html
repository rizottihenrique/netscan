<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/ico" href="{{ url_for('static', filename='favicon.ico') }}">
    <title>NetScan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-deep: #090b0f; 
            --bg-card: #14171c; 
            --bg-input: #050505;
            --accent: #2ecc71; 
            --text: #ffffff; 
            --border: #24292f;
        }

        body { background-color: var(--bg-deep); color: var(--text); font-family: 'Montserrat', sans-serif; padding-bottom: 50px; }
        
        .navbar-custom { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 1rem 2rem; }
        
        .scan-header { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 2rem; }
        
        .input-group-custom { 
            background: var(--bg-input); border: 1px solid var(--border); 
            border-radius: 8px; padding: 8px 15px; display: flex; align-items: center; 
        }
        .input-group-custom input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        .btn-scan { 
            background: var(--accent); color: #000; font-weight: 700; border: none; 
            padding: 0 30px; border-radius: 8px; height: 45px; transition: 0.3s; 
        }
        .btn-scan:hover { filter: brightness(1.1); transform: scale(1.02); }

        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); display: block; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.8; font-weight: 600; }

        .panel-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: 100%; }
        
        /* FIX: Força o fundo escuro e texto branco na tabela ignorando padrões do Bootstrap */
        .table-responsive { border-radius: 8px; overflow: hidden; }
        .table-custom { 
            background-color: transparent !important; 
            color: #ffffff !important; 
            margin-bottom: 0;
            --bs-table-bg: transparent !important;
            --bs-table-color: #ffffff !important;
        }
        .table-custom thead th { 
            background-color: rgba(255,255,255,0.02) !important;
            color: var(--accent) !important; 
            border-bottom: 2px solid var(--border) !important;
            text-transform: uppercase; font-size: 0.75rem; padding: 15px;
        }
        .table-custom td { 
            background-color: transparent !important;
            color: #ffffff !important; 
            border-bottom: 1px solid var(--border) !important;
            padding: 12px; font-size: 0.85rem;
            vertical-align: middle;
        }

        .btn-export { background: transparent; border: 1px solid var(--border); color: #fff; font-size: 0.7rem; padding: 5px 12px; border-radius: 5px; transition: 0.2s; }
        .btn-export:hover { background: var(--accent); color: #000; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .panel-container { border: 1px solid #ccc !important; }
            .table-custom td, .table-custom th { color: black !important; border-bottom: 1px solid #ccc !important; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-custom mb-4 no-print">
        <div class="container-fluid">
            <span class="fw-bold" style="letter-spacing: 1px;">
                <i class="fas fa-shield-alt me-2" style="color:var(--accent)"></i>NET<span style="color:var(--accent)">SCAN</span>
            </span>
        </div>
    </nav>

    <div class="container-fluid px-lg-5">
        <div class="scan-header no-print">
            <div class="row align-items-center">
                <div class="col-md-5">
                    <h3 class="fw-700 mb-1">Scanner de Segurança</h3>
                    <p class="small text-white-50">Auditoria de rede e descoberta de serviços.</p>
                </div>
                <div class="col-md-7">
                    <div class="d-flex gap-2">
                        <select id="scanMode" class="form-select bg-dark text-white border-secondary" style="width: auto; font-size: 0.85rem;">
                            <option value="TCP">TCP FULL</option>
                            <option value="TCP_FAST">TCP FAST</option>
                            <option value="UDP">UDP SCAN</option>
                        </select>
                        <div class="input-group-custom flex-grow-1">
                            <i class="fas fa-network-wired text-muted"></i>
                            <input type="text" id="network" value="192.168.1.0/24">
                        </div>
                        <button class="btn-scan" onclick="scanNetwork()">
                            <i class="fas fa-bolt me-2" id="scanIcon"></i><span id="btnText">SCAN</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="stat-card">
                <span class="stat-label">Hosts Ativos</span>
                <span class="stat-value" id="hosts">0</span>
            </div></div>
            <div class="col-md-3"><div class="stat-card">
                <span class="stat-label">Portas Abertas</span>
                <span class="stat-value" id="ports">0</span>
            </div></div>
            <div class="col-md-3"><div class="stat-card">
                <span class="stat-label">Serviços</span>
                <span class="stat-value" id="services-count">0</span>
            </div></div>
            <div class="col-md-3"><div class="stat-card">
                <span class="stat-label">Status</span>
                <span class="stat-value" id="system-status">OK</span>
            </div></div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="panel-container">
                    <h6 class="mb-4" style="font-weight: 700; font-size: 0.8rem; text-transform: uppercase;">Distribuição de Serviços</h6>
                    <div style="height: 300px;"><canvas id="servicesChart"></canvas></div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="panel-container">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h6 class="mb-0" style="font-weight: 700; font-size: 0.8rem; text-transform: uppercase;">Inventário de Ativos</h6>
                        <div class="no-print d-flex gap-2">
                            <button class="btn-export" onclick="exportCSV()"><i class="fas fa-file-csv me-1"></i> CSV</button>
                            <button class="btn-export" onclick="window.print()"><i class="fas fa-file-pdf me-1"></i> PDF</button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-custom" id="scanTable">
                            <thead>
                                <tr>
                                    <th>IP Address</th>
                                    <th>Porta/Prot</th>
                                    <th>Serviço</th>
                                    <th>Versão</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr><td colspan="5" class="text-center text-muted py-4">Aguardando início do scan...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/charts.js"></script>
    <script>
        async function scanNetwork() {
            const btn = document.querySelector('.btn-scan');
            const icon = document.getElementById('scanIcon');
            const btnText = document.getElementById('btnText');
            const statusLabel = document.getElementById('system-status');
            const network = document.getElementById("network").value;
            const mode = document.getElementById("scanMode").value;

            btn.disabled = true;
            btnText.innerText = "SCANNING...";
            statusLabel.innerText = "BUSY";
            statusLabel.style.color = "#f1c40f";
            icon.className = "fas fa-sync fa-spin me-2";

            try {
                const response = await fetch(`/scan?network=${network}&mode=${mode}`);
                const data = await response.json();
                renderDashboard(data);
                statusLabel.innerText = "OK";
                statusLabel.style.color = "#2ecc71";
            } catch (error) {
                statusLabel.innerText = "ERROR";
                statusLabel.style.color = "#e74c3c";
                console.error(error);
            } finally {
                btn.disabled = false;
                btnText.innerText = "SCAN";
                icon.className = "fas fa-bolt me-2";
            }
        }

        function renderDashboard(data) {
            const body = document.getElementById("tableBody");
            body.innerHTML = "";
            let pCount = 0, services = {};

            if (!data.hosts || data.hosts.length === 0) {
                body.innerHTML = "<tr><td colspan='5' class='text-center'>Nenhum host encontrado.</td></tr>";
                return;
            }

            data.hosts.forEach(h => {
                h.ports.forEach(p => {
                    pCount++;
                    let sName = p.service || 'unknown';
                    services[sName] = (services[sName] || 0) + 1;
                    body.innerHTML += `<tr>
                        <td style="font-weight: 600;">${h.ip}</td>
                        <td style="color: var(--accent); font-family: monospace; font-weight: bold;">${p.port}/${p.protocol.toUpperCase()}</td>
                        <td>${sName}</td>
                        <td>${p.product || '-'} ${p.version || ''}</td>
                        <td style="color:var(--accent); font-weight: 700;"><i class="fas fa-check-circle me-1"></i> Open</td>
                    </tr>`;
                });
            });

            document.getElementById("hosts").innerText = data.hosts.length;
            document.getElementById("ports").innerText = pCount;
            document.getElementById("services-count").innerText = Object.keys(services).length;
            
            if (typeof drawServicesChart === 'function') {
                drawServicesChart(services);
            }
        }
    </script>
</body>
</html>
